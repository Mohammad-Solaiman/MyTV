<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sama Live - اختيار المسلسل</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { display: flex; justify-content: center; gap: 20px; padding: 50px; flex-wrap: wrap; }
        .card { background: #333; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 200px; }
        .card:hover { background: #444; transform: scale(1.05); }
        img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>اختر المسلسل للمشاهدة</h1>
    <div id="series-list" class="container"></div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('series-list');
                data.series.forEach(s => {
                    list.innerHTML += `
                        <div class="card" onclick="location.href='player.html?id=${s.id}'">
                            <img src="${s.poster}" alt="${s.title}">
                            <h3>${s.title}</h3>
                        </div>`;
                });
            });
    </script>
</body>
</html>
